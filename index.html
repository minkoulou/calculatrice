<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculatrice</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montaga&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="bg-linear-to-l from-blue-200 to-green-300 flex items-center h-screen justify-center max-sm:flex max-sm:items-center">

    <!-- parent principal -->
    <div class="w-[30%] h-[80vh] bg-white rounded-xl animate-transform max-sm:w-[90%] max-sm:h-[80vh]" id="principal">

        <div class="w-full bg-green-300/30 h-[4vh] flex">
            <!-- trois petit rond a gauche -->
            <div class="inline-flex gap-2 h-full w-[15%] items-center justify-start flex-1 pl-2 max-sm:hidden">
                <div class="w-4 h-4 rounded-full bg-amber-600"></div>
                <div class="w-4 h-4 rounded-full bg-orange-300"></div>
                <div class="w-4 h-4 rounded-full bg-green-600"></div>
            </div>
            <!-- text calculator au centre -->
            <h1 class=" text-2xl text-gray-500/50 flex-2  pl-8 max-sm:text-xl max-sm:pr-4 max-sm:text-center">Calculator</h1>
        </div>
        <!-- ecran d'affichage de la calculatrice -->
        <textarea type="text" class="w-full h-[10vh] border border-white text-gray-500/70 text-right pr-4 pt-8" id="affichage" disabled></textarea>
        <!-- creation des boutons de la calculatrice -->
        <div class="grid grid-cols-4">
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">X</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">+/-</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">%</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">/</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">7</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">8</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">9</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">*</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">4</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">5</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">6</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">-</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">1</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">2</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">3</button>
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">+</button>
            <button class="w-full h-[13.2vh]  rounded-bl-2xl border border-green-300/50 text-gray-500/50 text-2xl col-span-2">0</button>
            <!-- <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl"></button> -->
            <button class="w-full h-[13.2vh]  border border-green-300/50 text-gray-500/50 text-2xl">.</button>
            <button class="w-full h-[13.2vh]  rounded-br-2xl border border-green-300/50 text-gray-500/50 text-2xl">=</button>
        </div>
      <div class="block text-center">
      <span>Created BY:</span>
      <span id="nom">MINKOULOU</span>
     </div>
    </div>

   <script src="./script.js"></script>
</body>

</html>
